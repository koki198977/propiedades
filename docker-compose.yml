version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: propiedades_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: propiedades_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d propiedades_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin opcional — útil para explorar la DB visualmente
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: propiedades_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@propiedades.local
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - admin  # Solo se levanta con: docker-compose --profile admin up

volumes:
  postgres_data:
    driver: local
